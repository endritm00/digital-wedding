name: Abandon reminder

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sS -X GET "${{ secrets.APP_URL }}/api/cron/abandon-reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP status: %{http_code}\n" \
            --fail-with-body
